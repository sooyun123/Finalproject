<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Motion Video</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
</head>

<body style="margin:0; overflow:hidden; background:black;">

<script>

let video1, video2;
let cam;
let prevFrame;

let motionFrames = 0;
let requiredFrames = 6;

let playingSecond = false;
let soundPlayed = false;
let audio;

// 🔥 브라우저 감지
let isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

let threshold;
let stepSize;

if (isSafari) {
  threshold = 1500;
  stepSize = 8;
} else {
  threshold = 3000;
  stepSize = 16;
}

function setup() {
  createCanvas(windowWidth, windowHeight);

  // 🎬 첫 영상 (자동재생)
  video1 = createVideo(['first.mp4']);
  video1.hide();
  video1.volume(0);
  video1.loop();
  video1.play();
  video1.elt.setAttribute("playsinline", "");

  // 🎬 두 번째 영상
  video2 = createVideo(['second.mp4']);
  video2.hide();
  video2.volume(0);
  video2.stop();
  video2.elt.setAttribute("playsinline", "");

  // 📷 웹캠
  cam = createCapture(VIDEO);
  cam.size(320, 240);
  cam.hide();

  // 🔊 사운드
  audio = new Audio('sound.m4a');
}

function draw() {
  background(0);

  // 🎬 기본 영상 항상 먼저
  if (!playingSecond) {
    image(video1, 0, 0, width, height);
  }

  // 🎬 두 번째 영상 상태
  if (playingSecond) {
    image(video2, 0, 0, width, height);

    if (video2.elt.ended) {
      playingSecond = false;
      video2.stop();
      video1.loop();
      soundPlayed = false;
    }
    return;
  }

  // 👁 움직임 감지
  cam.loadPixels();

  if (prevFrame) {
    let diff = 0;

    for (let i = 0; i < cam.pixels.length; i += stepSize) {
      let d = abs(cam.pixels[i] - prevFrame[i]);

      if (d > 20) {
        diff += d;
      }
    }

    if (diff > threshold) {
      motionFrames++;
    } else {
      motionFrames *= 0.8;
    }

    if (motionFrames > requiredFrames) {
      startSecondVideo();
      motionFrames = 0;
    }
  }

  prevFrame = cam.pixels.slice();
}

function startSecondVideo() {
  playingSecond = true;

  video1.stop();
  video2.play();

  // 🔊 사운드
  if (!soundPlayed) {
    audio.currentTime = 0;
    audio.play();
    soundPlayed = true;
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

</script>

</body>
</html>
