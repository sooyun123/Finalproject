<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Motion Video</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
</head>

<body style="margin:0; overflow:hidden; background:black;">
<script>

let video1, video2;
let cam;
let prevFrame;
let threshold = 20; // ⭐ 민감도 (10~20 추천)

let playingSecond = false;
let soundPlayed = false;
let audio;

function setup() {
  createCanvas(windowWidth, windowHeight);

  // 🎬 영상
  video1 = createVideo(['first.mp4']);
  video2 = createVideo(['second.mp4']);

  video1.hide();
  video2.hide();

  video1.loop();   // 기본 영상 반복
  video2.stop();

  // 📷 웹캠
  cam = createCapture(VIDEO);
  cam.size(320, 240); // 작게 해서 더 빠르게 감지
  cam.hide();

  // 🔊 사운드
  audio = new Audio('sound.m4a');
}

function draw() {
  background(0);

  if (playingSecond) {
    image(video2, 0, 0, width, height);

    // 🎬 두번째 영상 끝나면 복귀
    if (video2.elt.ended) {
      playingSecond = false;
      video2.stop();
      video1.loop();
      soundPlayed = false;
    }

  } else {
    image(video1, 0, 0, width, height);

    // 👁 움직임 감지
    cam.loadPixels();

    if (prevFrame) {
      let diff = 0;

      for (let i = 0; i < cam.pixels.length; i += 16) { // ⭐ 속도 + 민감도 개선
        let current = cam.pixels[i];
        let previous = prevFrame[i];
        diff += abs(current - previous);
      }

      let avg = diff / (cam.pixels.length / 16);

      if (avg > threshold && !playingSecond) {
        startSecondVideo();
      }
    }

    prevFrame = cam.pixels.slice();
  }
}

function startSecondVideo() {
  playingSecond = true;

  video1.stop();
  video2.play();

  // 🔊 사운드 재생
  if (!soundPlayed) {
    audio.currentTime = 0;
    audio.play();
    soundPlayed = true;
  }
}

// 📱 화면 크기 대응
function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

</script>
</body>
</html>
