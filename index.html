<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Motion Video</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
</head>

<body style="margin:0; overflow:hidden; background:black;">
<script>

let video1, video2;
let cam;
let prevFrame;

let threshold = 3000;     // ⭐ 적당한 민감도
let motionFrames = 0;
let requiredFrames = 6;   // ⭐ 너무 높지 않게

let playingSecond = false;
let soundPlayed = false;
let audio;

function setup() {
  createCanvas(windowWidth, windowHeight);

  // 🎬 첫 영상 (자동 재생 보장)
  video1 = createVideo(['first.mp4']);
  video1.hide();
  video1.volume(0);   // ⭐ 중요: autoplay 허용
  video1.loop();
  video1.play();      // ⭐ 처음부터 무조건 재생

  // 🎬 두 번째 영상
  video2 = createVideo(['second.mp4']);
  video2.hide();
  video2.volume(0);
  video2.stop();

  // 📷 웹캠
  cam = createCapture(VIDEO);
  cam.size(320, 240);
  cam.hide();

  // 🔊 사운드
  audio = new Audio('sound.m4a');
}

function draw() {
  background(0);

  // 🎬 항상 기본 영상 먼저 보여줌
  if (!playingSecond) {
    image(video1, 0, 0, width, height);
  }

  // 🎬 두 번째 영상 상태
  if (playingSecond) {
    image(video2, 0, 0, width, height);

    if (video2.elt.ended) {
      playingSecond = false;
      video2.stop();
      video1.loop();
      soundPlayed = false;
    }
    return;
  }

  // 👁 움직임 감지
  cam.loadPixels();

  if (prevFrame) {
    let diff = 0;

    for (let i = 0; i < cam.pixels.length; i += 16) {
      let d = abs(cam.pixels[i] - prevFrame[i]);

      if (d > 25) {   // ⭐ 노이즈 제거
        diff += d;
      }
    }

    if (diff > threshold) {
      motionFrames++;
    } else {
      motionFrames = max(0, motionFrames - 1); // ⭐ 부드럽게 감소
    }

    if (motionFrames > requiredFrames) {
      startSecondVideo();
      motionFrames = 0;
    }
  }

  prevFrame = cam.pixels.slice();
}

function startSecondVideo() {
  playingSecond = true;

  video1.stop();
  video2.play();

  // 🔊 사운드 (한 번만)
  if (!soundPlayed) {
    audio.currentTime = 0;
    audio.play();
    soundPlayed = true;
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

</script>
</body>
</html>
