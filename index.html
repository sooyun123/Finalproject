<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Motion Video</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
</head>

<body style="margin:0; overflow:hidden; background:black;">
<script>

let video1, video2;
let cam;
let prevFrame;

let threshold = 5000;     // ⭐ 큰 움직임만 감지
let motionFrames = 0;
let requiredFrames = 8;   // ⭐ 몇 프레임 지속돼야 반응

let playingSecond = false;
let soundPlayed = false;
let audio;

function setup() {
  createCanvas(windowWidth, windowHeight);

  // 🎬 영상
  video1 = createVideo(['first.mp4']);
  video2 = createVideo(['second.mp4']);

  video1.hide();
  video2.hide();

  video1.loop();
  video2.stop();

  // 📷 웹캠
  cam = createCapture(VIDEO);
  cam.size(320, 240); // 작게 = 안정 + 빠름
  cam.hide();

  // 🔊 사운드
  audio = new Audio('sound.m4a');
}

function draw() {
  background(0);

  if (playingSecond) {
    image(video2, 0, 0, width, height);

    if (video2.elt.ended) {
      playingSecond = false;
      video2.stop();
      video1.loop();
      soundPlayed = false;
    }

  } else {
    image(video1, 0, 0, width, height);

    cam.loadPixels();

    if (prevFrame) {
      let diff = 0;

      for (let i = 0; i < cam.pixels.length; i += 16) {
        let current = cam.pixels[i];
        let previous = prevFrame[i];

        let d = abs(current - previous);

        // ⭐ 작은 노이즈 무시
        if (d > 20) {
          diff += d;
        }
      }

      // ⭐ 일정 시간 지속된 움직임만 인정
      if (diff > threshold) {
        motionFrames++;
      } else {
        motionFrames = 0;
      }

      if (motionFrames > requiredFrames && !playingSecond) {
        startSecondVideo();
        motionFrames = 0;
      }
    }

    prevFrame = cam.pixels.slice();
  }
}

function startSecondVideo() {
  playingSecond = true;

  video1.stop();
  video2.play();

  if (!soundPlayed) {
    audio.currentTime = 0;
    audio.play();
    soundPlayed = true;
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

</script>
</body>
</html>
